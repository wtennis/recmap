<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecMap - Seattle Community Center Programming</title>
  <meta name="description" content="Find fitness, sports, arts, aquatics, dance, and more at Seattle community centers. Every program, every schedule, one map.">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="">

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header id="header">
    <div class="header-content">
      <h1>RecMap<span>Seattle Community Centers</span></h1>
      <div class="header-buttons">
        <button id="filter-toggle" class="header-btn">Filters</button>
        <button id="tab-map" class="header-btn active">Map</button>
        <button id="tab-schedule" class="header-btn">Schedule</button>
      </div>
    </div>
  </header>

  <div id="filter-bar" class="hidden">
    <div class="filter-dropdowns">
      <div class="dropdown" id="dd-centers">
        <button class="dropdown-toggle">Centers <span class="dd-count">All</span></button>
        <div class="dropdown-panel hidden">
          <div class="dd-actions">
            <button class="dd-select-all">Select All</button>
            <button class="dd-clear">Clear</button>
          </div>
          <div class="dd-options" id="dd-centers-options"></div>
        </div>
      </div>
      <div class="dropdown" id="dd-categories">
        <button class="dropdown-toggle">Categories <span class="dd-count">All</span></button>
        <div class="dropdown-panel hidden">
          <div class="dd-actions">
            <button class="dd-select-all">Select All</button>
            <button class="dd-clear">Clear</button>
          </div>
          <div class="dd-options" id="dd-categories-options"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="schedule-panel" class="hidden">
    <div class="day-tabs" id="day-tabs"></div>
    <div id="schedule-list"></div>
  </div>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>

  <!-- App JS -->
  <script src="js/app.js"></script>

</body>
</html>
